<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamLog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<nav class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex justify-between items-center">
    <a href="{% url 'dashboard' %}" class="text-purple-400 font-bold text-xl">🌙 DreamLog</a>
    {% if user.is_authenticated %}
    <div class="flex gap-4 items-center">
        <span class="text-gray-400 text-sm">{{ user.username }}</span>
        <a href="{% url 'dream_create' %}" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg text-sm transition">+ Novo Sonho</a>
        <a href="{% url 'logout' %}" class="text-gray-400 hover:text-white text-sm transition">Sair</a>
    </div>
    {% endif %}
</nav>

<main class="max-w-4xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
</main>

</body>
</html>
