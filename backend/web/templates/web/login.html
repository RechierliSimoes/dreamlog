{% extends 'web/base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <h1 class="text-3xl font-bold text-purple-400 mb-2">🌙 DreamLog</h1>
    <p class="text-gray-400 mb-8">Registre e visualize seus sonhos com IA.</p>

    <form method="post" class="bg-gray-900 p-6 rounded-xl border border-gray-800 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm text-gray-400 mb-1">Usuário</label>
            <input name="username" type="text" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500" required>
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Senha</label>
            <input name="password" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500" required>
        </div>
        {% if form.errors %}
        <p class="text-red-400 text-sm">Usuário ou senha incorretos.</p>
        {% endif %}
        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 py-2 rounded-lg font-medium transition">Entrar</button>
    </form>
</div>
{% endblock %}
